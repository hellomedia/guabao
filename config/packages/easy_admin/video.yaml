easy_admin:
    entities:
        Video:
            class: App\Entity\Video
            controller: App\Controller\Admin\VideoController
            list:
                fields:
                    - id
                    - createdAt
                    - title
                    - channel
                    - { property: 'tags', type: 'array' }
                    - people
                    - duration
                    - level
            show:
                fields:
                    - id
                    - title
                    - slug
                    - createdAt
                    - updatedAt
                    - url
                    - channel
                    - description
                    - { property: 'tags', type: 'array' }
                    - people
                    - duration
                    - level
            form:
                fields:
                    - title
                    - url
                    - channel
                    - description
                    - { property: 'people', type_options: { by_reference: false} }
                    - duration
                    - level
